<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>EQ Profile - The New Leaders</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #E67E22; --bg: #F8F9FA; --text: #2C3E50; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; }
        .app-container { width: 100%; max-width: 450px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 8px 20px rgba(0,0,0,0.05); text-align: center; }
        .option-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; border: 2px solid #EEE; border-radius: 12px; background: white; font-size: 1rem; cursor: pointer; text-align: left; }
        .option-btn:active { background: #FFF3E0; border-color: var(--primary); }
        .profile-badge { background: var(--primary); color: white; padding: 5px 15px; border-radius: 20px; font-weight: bold; margin-bottom: 10px; display: inline-block; }
        .profile-name { font-size: 1.8rem; font-weight: 800; margin: 5px 0; }
        .main-btn { background: #1877F2; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 1.1rem; font-weight: bold; width: 100%; margin-top: 15px; cursor: pointer; }
        #loading-overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 999; align-items: center; justify-content: center; flex-direction: column; }
        .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <b>Đang xử lý kết quả...</b>
</div>

<div class="app-container">
    <div id="quiz-screen" class="card">
        <h2 id="q-text">Đang tải câu hỏi...</h2>
        <div id="options"></div>
    </div>

    <div id="result-screen" style="display:none;">
        <div id="capture-area" class="card" style="margin-bottom: 15px; border: 1px solid #EEE;">
            <div style="font-size: 0.7rem; color: #999; margin-bottom: 10px;">THE NEW LEADERS | SELI ASSESSMENT</div>
            <div class="profile-badge">YOUR PROFILE</div>
            <div class="profile-name" id="res-name"></div>
            <div id="res-nick" style="font-style: italic; color: #666; margin-bottom: 15px;"></div>
            <div id="res-desc" style="text-align: left; font-size: 0.95rem; line-height: 1.5;"></div>
            <div style="margin-top: 20px; border-top: 1px solid #F0F0F0; padding-top: 10px; font-size: 0.7rem; color: #BBB;">
                Quét mã tại booth để khám phá EQ Profile của bạn!
            </div>
        </div>
        <div id="res-match" style="background:#FFF8E1; padding: 15px; border-radius: 12px; border: 1px dashed #FFB300; font-size: 0.85rem;"></div>
        <button class="main-btn" onclick="captureAndShare()">Chia sẻ & Nhận quà</button>
    </div>
</div>

<script>
    const questions = [
        { q: "Khi một dự án 'cháy deadline', bạn thường làm gì?", options: [{t:"Mở sơ đồ xem lỗi ở đâu", s:"Analytical"}, {t:"Xông vào làm cùng anh em", s:"Executor"}, {t:"Trấn an tinh thần mọi người", s:"Enthusiast"}] },
        { q: "Bạn đánh giá ứng viên dựa trên điều gì nhất?", options: [{t:"Số liệu và bằng chứng thực tế", s:"Skeptic"}, {t:"Tiềm năng phát triển tương lai", s:"Strategist"}, {t:"Cảm giác 'hợp gu' ngay lập tức", s:"Intuitive"}] },
        { q: "Trong cuộc họp, bạn là người...", options: [{t:"Đặt câu hỏi phản biện cực gắt", s:"Skeptic"}, {t:"Đưa ra các ý tưởng táo bạo", s:"Strategist"}, {t:"Ghi chép timeline chi tiết", s:"Executor"}] },
        { q: "Bạn thích môi trường làm việc như thế nào?", options: [{t:"Rõ ràng, logic, KPI cụ thể", s:"Analytical"}, {t:"Vui vẻ, truyền cảm hứng", s:"Enthusiast"}, {t:"Tốc độ, thực thi nhanh", s:"Executor"}] },
        { q: "Đồng nghiệp thường nói bạn là...", options: [{t:"Bậc thầy đọc vị tâm lý", s:"Intuitive"}, {t:"Thánh soi lỗi sai", s:"Analytical"}, {t:"Người truyền lửa", s:"Enthusiast"}] }
    ];

    const profiles = {
        "Strategist": { name: "The Strategist", nick: "Kẻ Mơ Mộng Có Căn Cứ", desc: "Bạn nhìn thấy tương lai khi người khác chỉ thấy hiện tại. Tầm nhìn của bạn khiến ứng viên tưởng mình đi thi Hoa hậu.", match: "Tìm 1 <b>Executor</b> để hiện thực hóa giấc mơ!" },
        "Executor": { name: "The Executor", nick: "Chuyên Gia Bóc Hành", desc: "Kẻ thù của 'chém gió'. Với bạn, ý tưởng hay mà không có quy trình thì chỉ là giấc mơ buổi trưa.", match: "Tìm 1 <b>Strategist</b> để biết cái thang bạn đang leo dẫn đi đâu!" },
        "Skeptic": { name: "The Skeptic", nick: "Máy Phát Hiện Nói Dối", desc: "Mắt laser soi lỗ hổng CV. Bạn không nghe những gì họ nói, bạn nghe những gì họ giấu.", match: "Tìm 1 <b>Intuitive</b> để so kèo 'Logic' và 'Linh tính'!" },
        "Enthusiast": { name: "The Enthusiast", nick: "Đại Sứ Hạnh Phúc", desc: "Bạn tuyển tâm hồn, không tuyển cỗ máy. Biến phỏng vấn thành talkshow chữa lành.", match: "Tìm 1 <b>Analytical</b> để được kéo xuống mặt đất!" },
        "Analytical": { name: "The Analytical", nick: "Thánh Excel Sống", desc: "Thế giới xây bằng khung năng lực và logic. Một câu trả lời sai STAR là một nốt nhạc phô.", match: "Tìm 1 <b>Enthusiast</b> để đưa cảm xúc vào biểu đồ!" },
        "Intuitive": { name: "The Intuitive", nick: "Bậc Thầy Đọc Vị", desc: "Radar bắt sóng tín hiệu vô hình. Bạn biết ứng viên có hợp hay không chỉ sau 3 giây.", match: "Tìm 1 <b>Skeptic</b> để kiểm chứng linh cảm của bạn!" }
    };

    let currentQ = 0, scores = {};

    function renderQuestion() {
        const q = questions[currentQ];
        document.getElementById('q-text').innerText = q.q;
        const optDiv = document.getElementById('options');
        optDiv.innerHTML = '';
        q.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.t;
            btn.onclick = () => {
                scores[opt.s] = (scores[opt.s] || 0) + 1;
                if(++currentQ < questions.length) renderQuestion(); else showResult();
            };
            optDiv.appendChild(btn);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        let winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
        const p = profiles[winner];
        document.getElementById('res-name').innerText = p.name;
        document.getElementById('res-nick').innerText = p.nick;
        document.getElementById('res-desc').innerText = p.desc;
        document.getElementById('res-match').innerHTML = "🔥 <b>Challenge:</b> " + p.match;
    }

    async function captureAndShare() {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        
        // Tự động tắt overlay sau 5 giây nếu bị treo
        const timeout = setTimeout(() => { overlay.style.display = 'none'; }, 5000);

        try {
            const canvas = await html2canvas(document.getElementById('capture-area'), {
                scale: 1.5, // Giảm xuống 1.5 để máy yếu vẫn chạy được
                useCORS: true,
                logging: false
            });
            
            canvas.toBlob(async (blob) => {
                const file = new File([blob], 'my-eq-profile.png', { type: 'image/png' });
                clearTimeout(timeout);
                overlay.style.display = 'none';

                if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                    await navigator.share({
                        files: [file],
                        title: 'My EQ Profile',
                        text: 'Tôi vừa khám phá EQ Profile của mình tại The New Leaders. Thử ngay!'
                    });
                } else {
                    // Fallback: Tải ảnh về máy
                    const link = document.createElement('a');
                    link.download = 'my-eq-profile.png';
                    link.href = URL.createObjectURL(blob);
                    link.click();
                    alert("Ảnh kết quả đã được tải về máy. Hãy dùng nó để đăng Facebook nhận quà nhé!");
                }
            }, 'image/png');
        } catch (err) {
            clearTimeout(timeout);
            overlay.style.display = 'none';
            alert("Có lỗi khi tạo ảnh. Bạn hãy chụp màn hình kết quả này nhé!");
        }
    }

    renderQuestion();
</script>
</body>
</html>
